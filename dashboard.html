<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Envíos</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.dataTables.css">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        📦 Control Envíos
    </div>

<ul>

    <li class="menu-item active" onclick="cargar('inicio','Inicio',this)">
        <i class="fa-solid fa-house"></i>
        Inicio
    </li>

    <li class="menu-item" onclick="cargar('pedidos','Pedidos',this)">
        <i class="fa-solid fa-box"></i>
        Pedidos
    </li>

    <li class="menu-item" onclick="cargar('nuevo','Nuevo Pedido',this)">
        <i class="fa-solid fa-circle-plus"></i>
        Nuevo Pedido
    </li>

    <li class="menu-item" onclick="cargar('usuarios','Usuarios',this)">
        <i class="fa-solid fa-users"></i>
        Usuarios
    </li>

    <li class="menu-item" onclick="cargar('reportes','Reportes',this)">
        <i class="fa-solid fa-chart-column"></i>
        Reportes
    </li>

    <li onclick="salir()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Salir
    </li>

</ul>

    

</div>

<div class="main">

<div class="topbar">

<h2 id="titulo">Inicio</h2>

<div class="usuario">

<i class="fa-solid fa-user"></i>

<span id="usuario"></span>

</div>

</div>

<div id="contenido"></div>

</div>
<!-- MODAL USUARIO -->
<div class="modal" id="modalUsuario">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="tituloUsuario">Nuevo Usuario</h2>

            <span class="cerrar" onclick="cerrarModalUsuario()">&times;</span>

        </div>

        <div class="form-grid">

            <div>
                <label>Nombre</label>
                <input type="text" id="nombreUsuario">
            </div>

            <div>
                <label>Correo</label>
                <input type="email" id="correoUsuario">
            </div>

            <div>
                <label>Contraseña</label>
                <input type="password" id="passwordUsuario">
            </div>

            <div>
                <label>Rol</label>

                <select id="rolUsuario">
                    <option>Administrador</option>
                    <option>Operador</option>
                </select>

            </div>

            <div>
                <label>Estado</label>

                <select id="estadoUsuario">
                    <option>Activo</option>
                    <option>Inactivo</option>
                </select>

            </div>

        </div>

        <div style="margin-top:25px;text-align:right;">

            <button class="btn-primary" onclick="guardarUsuario()">

                Guardar Usuario

            </button>

        </div>

    </div>

</div>
<!-- MODAL NUEVO PEDIDO -->
<div class="modal" id="modalPedido">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Nuevo Pedido</h2>

            <span class="cerrar" onclick="cerrarModal()">&times;</span>
        </div>

        <div class="form-grid">

            <div>
                <label>Plataforma</label>

                <select id="plataforma">
                    <option>E-COMMERCE(SITE)</option>
                    <option>VENTA ONLINE</option>
                    <option>Tienda</option>
                    <option>WhatsApp</option>
                </select>
            </div>

            <div>
                <label>N° Pedido</label>
                <input type="text" id="pedido">
            </div>

            <div>
                <label>Cliente</label>
                <input type="text" id="cliente">
            </div>

            <div>
                <label>Contacto</label>
                <input type="text" id="contacto">
            </div>
            <div>
    <label>Fecha de Venta</label>
    <input type="date" id="fechaVenta">
</div>

            <div>
                <label>Valor</label>
                <input type="number" id="valor">
            </div>

            <div>
                <label>Transportadora</label>

                <select id="transportadora">

                    <option>AEX</option>

                    <option>TSI</option>

                    <option>Azul Cargo</option>

                    <option>Loggi</option>

                </select>

            </div>

            <div>

                <label>Guía</label>

                <input type="text" id="guia">

            </div>
<div>
    <label>Fecha de Envío</label>
    <input type="date" id="fechaEnvio">
</div>
            <div>

                <label>Estado</label>

                <select id="estado">

                    <option>Pendiente</option>

                    <option>Enviado</option>

                    <option>Entregado</option>

                    <option>Cancelado</option>

                </select>

            </div>
<div>
    <label>Motivo</label>
    <input type="text" id="motivo">
</div>
        </div>

        <div style="margin-top:25px;text-align:right;">

            <button class="btn-primary" onclick="guardarPedido()">

                Guardar Pedido

            </button>

        </div>

    </div>

</div>
<div id="loader" class="loader-overlay">

    <div class="loader-box">

        <div class="loader-spinner"></div>

        <p id="loaderTexto">Cargando...</p>

    </div>

</div>
<script src="js/api.js"></script>
<script src="js/loader.js"></script>
<script src="js/dashboard.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
</body>
</html>
